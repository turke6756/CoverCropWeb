# Netlify config for Ed Turk's portfolio site.
# Serves the contents of Web_App/Data/: the portfolio at the root, and the
# CoverCrop Explorer map app at /covercrop/.
[build]
  publish = "Web_App/Data"

# The map app used to live at the site root. Keep old shared links working.
[[redirects]]
  from   = "/webApp.html"
  to     = "/covercrop/"
  status = 301